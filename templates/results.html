<!-- templates/results.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <!-- Include Bootstrap CSS for styling -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        /* Custom styles for the color picker grid */
        .color-picker-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .color-picker-item {
            width: 50px;
            margin: 2px;
            text-align: center;
            font-size: 12px;
        }
        .color-picker-item input[type="color"] {
            width: 100%;
            height: 20px;
            border: none;
            padding: 0;
            margin-top: 2px;
        }
        .color-picker-container {
            max-height: 400px; /* Adjust as needed */
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin: 0 auto; /* Center the container */
            display: inline-block; /* Ensure margin: 0 auto works */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Results</h1>
        <br>
        <!-- Display the Plotly graph -->
        {{ plotly_graph | safe }}
        <br>
        <!-- Color Selection Form -->
        <div style="text-align: center;">
        <form method="POST">
            <h3>Plot Settings</h3>
            <div style="margin-bottom: 15px;">
                <strong>Axis Settings</strong> <span style="font-size: 12px; color: #888;">(leave blank for defaults)</span>
                <div style="display: inline-flex; gap: 15px; margin-top: 5px;">
                    <label style="font-size: 12px;">X label <input type="text" name="x_label" value="{{ axis_settings.get('x_label', '') or '' }}" placeholder="Time (hours)" style="width: 120px;"></label>
                    <label style="font-size: 12px;">X min <input type="number" step="any" name="x_min" value="{{ axis_settings.get('x_min', '') if axis_settings.get('x_min') is not none else '' }}" style="width: 70px;"></label>
                    <label style="font-size: 12px;">X max <input type="number" step="any" name="x_max" value="{{ axis_settings.get('x_max', '') if axis_settings.get('x_max') is not none else '' }}" style="width: 70px;"></label>
                </div>
                <div style="display: inline-flex; gap: 15px; margin-top: 5px;">
                    <label style="font-size: 12px;">Y label <input type="text" name="y_label" value="{{ axis_settings.get('y_label', '') or '' }}" placeholder="OD600nm" style="width: 120px;"></label>
                    <label style="font-size: 12px;">Y min <input type="number" step="any" name="y_min" value="{{ axis_settings.get('y_min', '') if axis_settings.get('y_min') is not none else '' }}" style="width: 70px;"></label>
                    <label style="font-size: 12px;">Y max <input type="number" step="any" name="y_max" value="{{ axis_settings.get('y_max', '') if axis_settings.get('y_max') is not none else '' }}" style="width: 70px;"></label>
                </div>
            </div>
            <h3>Select Colors for Samples</h3>
            <div class="color-picker-container">
                <div class="color-picker-grid">
                    {% for sample in unique_samples %}
                    <div class="color-picker-item">
                        <label for="{{ sample_to_field_name[sample] }}">{{ sample }}</label>
                        <input type="color" id="{{ sample_to_field_name[sample] }}" name="{{ sample_to_field_name[sample] }}" value="{{ sample_colors[sample] | safe }}">
                    </div>
                    {% endfor %}
                </div>
            </div>
            <br>
            <button type="submit" class="btn btn-primary">Update Plot</button>
        </form>
        </div>
        <br>
        <div style="text-align: center;">
            <a href="{{ url_for('download', csv_filename='renamed_data.csv') }}" class="btn btn-primary">Download OD Data (CSV)</a>
            <a href="{{ url_for('download_growth_rate_csv') }}" class="btn btn-primary">Download Growth Rate (CSV)</a>
            <a href="{{ url_for('download_auc_csv') }}" class="btn btn-primary">Download AUC (CSV)</a>
            <a href="{{ url_for('download_report') }}" class="btn btn-primary">Download Full Report (HTML)</a>
            <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Upload</a>
        </div>
    </div>
</body>
</html>
